name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agent_platform
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d agent_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://agent:agent@localhost:5432/agent_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-change-me-secret
      DEFAULT_LLM_PROVIDER: mock
      DEFAULT_EMBEDDING_PROVIDER: mock
      FRONTEND_ORIGIN: http://localhost:3100
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Validate backend env
        working-directory: backend
        run: python scripts/check_env.py
      - name: Run tests
        working-directory: backend
        run: python -m pytest app/tests
      - name: Run SQL Guardrails eval smoke
        working-directory: backend
        run: python -m app.scripts.run_eval --type sql-guardrails --no-db
      - name: Run regression smoke
        working-directory: backend
        run: python -m app.scripts.run_regression --no-db
