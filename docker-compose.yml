services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: emtap_postgres
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: emtap_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: emtap_backend
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent_platform
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-to-a-long-random-secret
      JWT_EXPIRE_MINUTES: 1440
      DEFAULT_LLM_PROVIDER: mock
      DEFAULT_EMBEDDING_PROVIDER: mock
      VECTOR_DIMENSION: 1536
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
    container_name: emtap_celery_worker
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent_platform
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-to-a-long-random-secret
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEFAULT_LLM_PROVIDER: mock
      DEFAULT_EMBEDDING_PROVIDER: mock
      VECTOR_DIMENSION: 1536
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
    container_name: emtap_celery_beat
    profiles: ["beat"]
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent_platform
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-to-a-long-random-secret
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: emtap_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
